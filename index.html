<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Smythe&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <title>Zenji Diner</title>
</head>
    <body>
        <header>
            <h2 class="header-title">Zenji's Diner</h2>
            <p class="header-para">The ultimate food in town period!</p>
        </header>
        <div class="major-container">
            <main class="app-main" id="main-app">
                
            </main>
            <div class="yourorder hiding" id="ordered-items">
                <h4 class="yourorderh4">Your order</h4>
                <div>
                    <div class="item-of-order" id="pizza-item">
                        
                    </div>
                    <div class="item-of-order" id="burger-item">
                        
                    </div>
                    <div class="item-of-order" id="shake-item">
                        
                    </div>
                    <div class="item-of-order total-price">
                        <div class="item-of-order-name">
                            <h3>Total Price:</h3>
                        </div>
                        <p id="price-total"></p>
                    </div>
                </div>
                <button data-complete="complete" id="complete-order">Complete order</button>
            </div>
            <div class="form-container hiding" id="payment-div">
                <form action="" id="payment-form">
                    <p class="form-headind">Enter card details</p>
                    <input  required type="text" name="name" id="name" placeholder="Enter your name">
                    <input  required 
                        name="cardnumber" 
                        id="cardnumber"
                        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');" 
                        minlength="10"
                        maxlength="10"
                        placeholder="Enter card number">
                    <input  
                        required 
                        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');" 
                        name="cvv"
                        minlength="3"
                        maxlength="3"  
                        id="cvv" 
                        placeholder="Enter CVV">
                    <button type="submit" id="pay-submit">Pay</button>
                    <button type="reset" id="cancel">Cancel</button>
                </form>
                
            </div>
            <div class="thank-you hiding" id="thank-you-div">
                
            </div>
        </div>
        <script type="module" src="index.js"></script>
    </body>
</html>
